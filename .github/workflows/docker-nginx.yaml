name: Docker Nginx Pipeline

on:
  push:
    branches:
      - feature   # change to your branch, e.g. master, dev, etc.

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify Docker is installed
        run: docker --version

      - name: Pull nginx image
        run: docker pull nginx:latest

      - name: List Docker images
        run: docker images
      
      - name: check the active containers
        run: docker ps -a
      
      - name: Run nginx container
        run: docker run -d --name nginx-test -p 8080:80 nginx:latest

      - name: Wait for container to be ready
        run: sleep 5

      - name: List running containers
        run: docker ps

      - name: Verify nginx is serving
        run: curl -s http://localhost:8080 | head -20

      - name: Show container logs
        run: docker logs nginx-test